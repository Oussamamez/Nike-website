{% extends "base.html" %}
{% block title %}Sign In | Nike{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 80 30" fill="currentColor" class="auth-swoosh">
                <path d="M79.6 1.2L26.4 23.7c-4.5 1.9-8.3 2.8-11.4 2.8-4.9 0-8.3-2.3-10.2-6.9L0 7.3l1-.4 4.4 5.5c1.7 2.1 3.8 3.1 6.3 3.1 2.1 0 4.7-.7 7.8-2.1L79.6 1.2z"/>
            </svg>
        </div>
        <h2 class="auth-title">Sign In</h2>
        <p class="auth-subtitle">Your style. Your story. Your Nike.</p>

        {% if error %}
        <div class="form-error-banner">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" required placeholder="you@example.com" autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-wrap">
                    <input type="password" name="password" class="form-input" required placeholder="••••••••" id="passwordInput">
                    <button type="button" class="password-toggle" onclick="togglePassword()">Show</button>
                </div>
            </div>
            <button type="submit" class="btn btn-dark btn-full btn-lg">Sign In</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <div class="auth-footer">
            <p>Not a Member? <a href="/register" class="auth-link">Join Us</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const btn = document.querySelector('.password-toggle');
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
    } else {
        input.type = 'password';
        btn.textContent = 'Show';
    }
}
</script>
{% endblock %}
